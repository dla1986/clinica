<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Médicos</title>
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200">

	<div th:insert="~{misc/fragments :: menuAtendimento}"></div>

	<div class="container mx-auto p-8">

		<div class="flex justify-between items-center mb-6">
			<div>
				<h1 class="text-4xl font-bold text-primary">
					<i class="fa-solid fa-user-doctor"></i> Médicos
				</h1>
				<p class="text-base-content/70">Cadastro dos médicos da clínica.</p>
			</div>
			<a class="btn btn-primary" th:href="@{/medico/novo}">
				<i class="fa-solid fa-plus"></i> Novo Médico
			</a>
		</div>

		<div class="overflow-x-auto bg-base-100 rounded-xl shadow-lg">
			<table class="table table-zebra">
				<thead>
					<tr>
						<th>CRM</th>
						<th>Nome</th>
						<th>Especialidade</th>
						<th>Contato (Telefone)</th>
						<th>Login</th>
						<th width="170">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="m : ${medicos}">
						<td><span class="badge badge-primary" th:text="${m.crm}"></span></td>
						<td th:text="${m.nome}"></td>
						<td th:text="${m.especialidade}"></td>
						<td th:text="${m.contato}"></td>
						<td th:text="${m.login}"></td>
						<td>
							<div class="join">
								<a class="btn btn-warning btn-sm join-item"
									th:href="@{'/medico/edit/' + ${m.crm}}"> 
									<i class="fa-solid fa-pen"></i>
								</a>
								<a class="btn btn-error btn-sm join-item"
									th:href="@{'/medico/delete/' + ${m.crm}}">
									<i class="fa-solid fa-trash"></i>
								</a>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

	<dialog id="medico_modal" class="modal" th:classappend="${exibirModal} ? 'modal-open' : ''">
		<div class="modal-box max-w-3xl">
			
			<a th:href="@{/medico}" class="btn btn-circle btn-sm btn-ghost absolute right-2 top-2">✕</a>

			<h3 class="font-bold text-2xl mb-6">
				<i class="fa-solid fa-user-doctor"></i> Cadastro de Médico
			</h3>

			<form th:action="@{/medico/save}" method="post" th:object="${medico}">

				<div class="grid grid-cols-2 gap-4">
					<div>
						<label class="label"> <span class="label-text">CRM</span></label> 
						<input class="input input-bordered w-full" th:field="*{crm}" required th:readonly="${medico.crm != null}">
					</div>

					<div>
						<label class="label"> <span class="label-text">Nome</span></label> 
						<input class="input input-bordered w-full" th:field="*{nome}" required>
					</div>

					<div>
						<label class="label"> <span class="label-text">Especialidade</span></label> 
						<input class="input input-bordered w-full" th:field="*{especialidade}">
					</div>

					<div>
						<label class="label"> <span class="label-text">Contato (Telefone)</span></label> 
						<input class="input input-bordered w-full" th:field="*{contato}">
					</div>

					<div class="col-span-2">
						<label class="label"> <span class="label-text">Login</span></label> 
						<input type="text" class="input input-bordered w-full" th:field="*{login}" required>
					</div>

					<div class="col-span-2">
						<label class="label"> <span class="label-text">Senha</span></label> 
						<input type="password" class="input input-bordered w-full" th:field="*{senha}">
					</div>
				</div>

				<div class="modal-action">
					<a th:href="@{/medico}" class="btn">Cancelar</a>
					<button class="btn btn-primary">
						<i class="fa-solid fa-floppy-disk"></i> Salvar
					</button>
				</div>

			</form>
		</div>

		<a th:href="@{/medico}" class="modal-backdrop">Fechar</a>
	</dialog>

</body>
</html>
