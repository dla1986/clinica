<!DOCTYPE html>
<html lang="pt-BR" data-theme="light"
	xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clínica Médica - Login</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
	type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body
	class="bg-base-200 min-h-screen flex justify-center items-center p-4">


	<div class="card bg-base-100 w-full max-w-md shadow-2xl">
		<div class="card-body">

			<div class="text-center mb-6">
				<div class="text-6xl mb-3">🏥</div>
				<h1 class="text-3xl font-bold text-primary">Clínica Médica</h1>
				<p class="text-base-content/60 mt-2">Sistema de Gerenciamento</p>
			</div>

			<form method="POST" th:action="@{/login}">

				<div class="form-control">
					<label class="label"> <span
						class="label-text font-semibold">CRM</span>
					</label> <input type="text" name="crm" class="input input-bordered w-full"
						placeholder="Digite seu CRM" required>
				</div>

				<div class="form-control mt-4">
					<label class="label"> <span
						class="label-text font-semibold">Senha</span>
					</label> <input type="password" name="senha"
						class="input input-bordered w-full" placeholder="Digite sua senha"
						required>
				</div>

				<div class="mt-6">
					<button class="btn btn-primary w-full">Entrar</button>
				</div>
				<div class="mt-3">
					<a href="/" class="btn btn-outline w-full"> <i
						class="fa-solid fa-arrow-left mr-2"></i> Voltar ao Início
					</a>
				</div>

			</form>

			<div class="mt-5 text-center" th:if="${msg != null}">
				<span class="text-error font-medium" th:text="${msg}"></span>
			</div>

			<div class="divider">Sistema da Clínica</div>

			<div class="text-center text-sm text-base-content/60">
				Faça login utilizando seu <strong>CRM</strong> e sua <strong>senha</strong>.
			</div>

		</div>
	</div>

</body>
</html>
