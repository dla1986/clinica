<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Pacientes</title>
	<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
	<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200">

	<div th:insert="~{misc/fragments :: menuAtendimento}"></div>

	<div class="container mx-auto p-8">

		<div class="flex justify-between items-center mb-6">
			<div>
				<h1 class="text-4xl font-bold text-primary">
					<i class="fa-solid fa-user"></i> Pacientes
				</h1>
				<p class="text-base-content/70">Cadastro e gerenciamento dos pacientes da clínica.</p>
			</div>
			<a class="btn btn-primary" th:href="@{/paciente/novo}">
				<i class="fa-solid fa-plus"></i> Novo Paciente
			</a>
		</div>

		<div class="overflow-x-auto bg-base-100 rounded-xl shadow-lg">
			<table class="table table-zebra">
				<thead>
					<tr>
						<th>Nome</th>
						<th>CPF</th>
						<th>Contato (Telefone)</th>
						<th>Endereço</th>
						<th>Plano de Saúde</th> <th width="170">Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="p : ${pacientes}">
						<td>
							<div class="font-semibold" th:text="${p.nome}"></div>
						</td>
						<td th:text="${p.cpf}"></td>
						<td th:text="${p.contato}"></td>
						<td th:text="${p.endereco}"></td>
						<td>
							<span class="badge badge-secondary" th:text="${p.planoSaude ?: 'Sem Plano'}"></span>
						</td>
						<td>
							<div class="join">
								<a class="btn btn-warning btn-sm join-item"
									th:href="@{'/paciente/edit/' + ${p.cpf}}"> 
									<i class="fa-solid fa-pen"></i>
								</a>
								<a class="btn btn-error btn-sm join-item"
									th:href="@{'/paciente/delete/' + ${p.cpf}}">
									<i class="fa-solid fa-trash"></i>
								</a>
							</div>
						</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

	<dialog id="paciente_modal" class="modal" th:classappend="${exibirModal} ? 'modal-open' : ''">
		<div class="modal-box max-w-3xl">
			
			<a th:href="@{/paciente}" class="btn btn-circle btn-sm btn-ghost absolute right-2 top-2">✕</a>

			<h3 class="font-bold text-2xl mb-6">
				<i class="fa-solid fa-user-plus"></i> Cadastro de Paciente
			</h3>

			<form th:action="@{/paciente/save}" method="post" th:object="${paciente}">

				<div class="grid grid-cols-2 gap-4">
					<div>
						<label class="label"> 
							<span class="label-text">Nome</span>
						</label> 
						<input type="text" class="input input-bordered w-full"
							placeholder="Nome completo" th:field="*{nome}" required>
					</div>

					<div>
						<label class="label"> 
							<span class="label-text">CPF</span>
						</label> 
						<input type="text" class="input input-bordered w-full"
							placeholder="000.000.000-00" th:field="*{cpf}" required th:readonly="${paciente.cpf != null}">
					</div>

					<div class="col-span-2">
						<label class="label"> 
							<span class="label-text">Contato (Telefone)</span>
						</label> 
						<input type="text" class="input input-bordered w-full"
							placeholder="(81) 99999-9999" th:field="*{contato}">
					</div>

					<div class="col-span-2">
						<label class="label"> 
							<span class="label-text">Endereço</span>
						</label> 
						<input type="text" class="input input-bordered w-full"
							placeholder="Rua, número, bairro..." th:field="*{endereco}">
					</div>

					<div class="col-span-2">
						<label class="label"> 
							<span class="label-text">Plano de Saúde</span>
						</label> 
						<input type="text" class="input input-bordered w-full"
							placeholder="Ex: Unimed, Bradesco, Particular..." th:field="*{planoSaude}">
					</div>
				</div>

				<div class="modal-action">
					<a th:href="@{/paciente}" class="btn">Cancelar</a>
					<button type="submit" class="btn btn-primary">
						<i class="fa-solid fa-floppy-disk"></i> Salvar
					</button>
				</div>

			</form>
		</div>

		<a th:href="@{/paciente}" class="modal-backdrop">Fechar</a>
	</dialog>

</body>
</html>
